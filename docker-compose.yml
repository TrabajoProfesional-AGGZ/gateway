version: '3.8'

services:
  krakend:
    image: krakend:latest
    container_name: sociounido_gateway
    env_file:
      - .env
    environment:
      - FC_ENABLE=1
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json
    ports:
      - "${API_PORT}:8080"
    command: ["run", "-d", "-c", "/etc/krakend/krakend.json"]
    networks:
      - sociounido_net

networks:
  sociounido_net:
    driver: bridge