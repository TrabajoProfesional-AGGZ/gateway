# sociounido-gateway/docker-compose.yml
version: '3.8'

services:
  krakend:
    image: krakend:latest
    container_name: sociounido_gateway
    env_file:
      - .env
    environment:
      - FC_ENABLE=1
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - MS_CLUB_URL=${MS_CLUB_URL}
      - INTERNAL_SECRET_TOKEN=${INTERNAL_SECRET_TOKEN}
      - API_PORT=${API_PORT}
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json
    ports:
      - "${API_PORT}:8080"
    networks:
      - sociounido_net

  ms-core:
    build: ../microservicio-club
    container_name: sociounido_ms_core_integ
    env_file:
      - ../microservicio-club/.env
    networks:
      - sociounido_net

networks:
  sociounido_net:
    driver: bridge